name: Sort Check

on:
  pull_request:
    paths:
      - "README.md"

jobs:
  sort-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check alphabetical ordering
        run: make sort_check
